<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — Fleet Management</title>
  <link rel="stylesheet" href="css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    .card-link { cursor: pointer; transition: box-shadow 0.15s; }
    .card-link:hover { box-shadow: var(--tblr-shadow-card-hover); text-decoration: none; }
    .avatar-initials {
      width: 2rem; height: 2rem; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .875rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.active   { background: var(--tblr-success); }
    .status-dot.inactive { background: var(--tblr-danger); }
    .status-dot.other    { background: var(--tblr-secondary); }
    .skeleton-card { min-height: 120px; }
    .navbar-brand-image { height: 2rem; }
  </style>
</head>
<body class="antialiased">
<div class="page">

  <!-- Sidebar -->
  <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <h1 class="navbar-brand navbar-brand-autodark">
        <a href="#">
          <img src="img/logo.svg" class="navbar-brand-image" alt="FAHR Electronics"
               onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
          <span style="display:none;font-size:1rem;font-weight:700;">📡 Fleet</span>
        </a>
      </h1>
      <div class="collapse navbar-collapse" id="sidebar-menu">
        <ul class="navbar-nav pt-lg-3">
          <li class="nav-item">
            <a class="nav-link active" href="#">
              <span class="nav-link-icon d-md-none d-lg-inline-block">
                <i class="ti ti-users"></i>
              </span>
              <span class="nav-link-title">Clientes</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" id="nav-map-link" href="#">
              <span class="nav-link-icon d-md-none d-lg-inline-block">
                <i class="ti ti-map-2"></i>
              </span>
              <span class="nav-link-title">Mapa</span>
            </a>
          </li>
        </ul>
        <div class="mt-auto">
          <div class="py-3 px-3 border-top border-top-light">
            <div class="d-flex align-items-center mb-2">
              <div class="me-2">
                <span class="avatar avatar-sm" id="sidebar-avatar" style="background:#206bc4">S</span>
              </div>
              <div>
                <div class="fw-medium text-white" id="sidebar-name" style="font-size:.875rem;"></div>
                <div id="sidebar-role" style="font-size:.75rem;opacity:.6;color:#fff;text-transform:uppercase;letter-spacing:.05em;"></div>
              </div>
            </div>
            <button class="btn btn-sm w-100 mt-1" style="background:rgba(255,255,255,.1);color:#fff;border:none;"
                    onclick="doLogout()">
              <i class="ti ti-logout me-1"></i> Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Page wrapper -->
  <div class="page-wrapper">

    <!-- Top navbar -->
    <header class="navbar navbar-expand-md d-none d-lg-flex d-print-none">
      <div class="container-xl">
        <div class="me-3 d-flex">
          <input type="search" id="search-input" class="form-control form-control-sm"
                 placeholder="Buscar clientes..." oninput="filterClients(this.value)"
                 style="width:240px;">
        </div>
        <div class="ms-auto d-flex align-items-center gap-2">
          <span id="count-badge" class="badge bg-secondary-subtle text-secondary"></span>
        </div>
      </div>
    </header>

    <!-- Page body -->
    <div class="page-body">
      <div class="container-xl">

        <!-- Page header -->
        <div class="page-header d-print-none">
          <div class="row align-items-center">
            <div class="col">
              <h2 class="page-title">Clientes Recientes</h2>
              <div class="text-muted mt-1">Selecciona un cliente para gestionar sus unidades y dispositivos</div>
            </div>
            <div class="col-auto ms-auto d-print-none d-lg-none">
              <input type="search" id="search-input-mobile" class="form-control form-control-sm"
                     placeholder="Buscar..." oninput="filterClients(this.value)"
                     style="width:180px;">
            </div>
          </div>
        </div>

        <!-- Clients grid -->
        <div class="row row-deck row-cards" id="clients-grid">
          <!-- skeleton loading -->
          <div class="col-sm-6 col-md-6 col-lg-6 col-xl-3">
            <div class="card skeleton-card placeholder-glow">
              <div class="card-body">
                <div class="placeholder col-8 mb-2"></div>
                <div class="placeholder col-5"></div>
              </div>
              <div class="card-footer p-2">
                <div class="placeholder col-4"></div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-md-6 col-lg-6 col-xl-3">
            <div class="card skeleton-card placeholder-glow">
              <div class="card-body">
                <div class="placeholder col-7 mb-2"></div>
                <div class="placeholder col-4"></div>
              </div>
              <div class="card-footer p-2">
                <div class="placeholder col-4"></div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-md-6 col-lg-6 col-xl-3">
            <div class="card skeleton-card placeholder-glow">
              <div class="card-body">
                <div class="placeholder col-9 mb-2"></div>
                <div class="placeholder col-6"></div>
              </div>
              <div class="card-footer p-2">
                <div class="placeholder col-4"></div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-md-6 col-lg-6 col-xl-3">
            <div class="card skeleton-card placeholder-glow">
              <div class="card-body">
                <div class="placeholder col-6 mb-2"></div>
                <div class="placeholder col-3"></div>
              </div>
              <div class="card-footer p-2">
                <div class="placeholder col-4"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <footer class="footer footer-transparent d-print-none">
      <div class="container-xl">
        <div class="row text-center align-items-center">
          <div class="col-12 col-lg-auto mt-3 mt-lg-0">
            <ul class="list-inline list-inline-dots mb-0">
              <li class="list-inline-item">FAHR Electronics Systems &copy; <span id="footer-year"></span></li>
            </ul>
          </div>
        </div>
      </div>
    </footer>

  </div><!-- /.page-wrapper -->
</div><!-- /.page -->

<script>
  const BASE_PATH = window.location.pathname.startsWith('/newdashboard') ? '/newdashboard' : '';
  const API = window.location.origin + BASE_PATH;

  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || 'null');
  if (!token || !user) window.location.replace(BASE_PATH + '/login.html');
  if (user && user.role !== 'admin' && user.role !== 'superuser') window.location.replace(BASE_PATH + '/');

  // Nav map link
  document.getElementById('nav-map-link').href = BASE_PATH + '/';

  // Footer year
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  // Sidebar user info
  const roleColors = { superuser: '#ae3ec9', admin: '#d63939', owner: '#f76707', driver: '#2fb344' };
  const sidebarName = document.getElementById('sidebar-name');
  const sidebarRole = document.getElementById('sidebar-role');
  const sidebarAvatar = document.getElementById('sidebar-avatar');
  if (user) {
    sidebarName.textContent = user.name || user.username;
    sidebarRole.textContent = user.role;
    const initials = (user.name || user.username || '?')[0].toUpperCase();
    sidebarAvatar.textContent = initials;
    sidebarAvatar.style.background = roleColors[user.role] || '#206bc4';
  }

  function doLogout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.replace(BASE_PATH + '/login.html');
  }

  let allClients = [];

  async function loadClients() {
    try {
      const res = await fetch(`${API}/api/clients`, { headers: { Authorization: `Bearer ${token}` } });
      if (res.status === 401) { doLogout(); return; }
      const data = await res.json();
      if (data.success) {
        allClients = data.clients;
        renderClients(allClients);
      } else {
        showError(data.error || 'Error al cargar clientes');
      }
    } catch (e) {
      showError('Servidor no disponible');
    }
  }

  const COLORS = ['#206bc4','#2fb344','#f76707','#ae3ec9','#d6336c','#0ca678','#4263eb','#d63939','#f59f00','#17a2b8'];
  function avatarColor(id) { return COLORS[id % COLORS.length]; }

  function renderClients(clients) {
    const grid = document.getElementById('clients-grid');
    const badge = document.getElementById('count-badge');
    badge.textContent = clients.length + ' clientes';

    if (!clients.length) {
      grid.innerHTML = `
        <div class="col-12">
          <div class="card">
            <div class="empty">
              <div class="empty-icon"><i class="ti ti-search" style="font-size:3rem;"></i></div>
              <p class="empty-title">Sin resultados</p>
              <p class="empty-subtitle text-muted">No se encontraron clientes con ese criterio.</p>
            </div>
          </div>
        </div>`;
      return;
    }

    const statusClass = s => {
      const v = (s || '').toLowerCase();
      return (v === 'active' || v === 'valid') ? 'active' : (v === 'inactive' || v === 'invalid') ? 'inactive' : 'other';
    };
    const statusLabel = s => {
      const v = (s || '').toLowerCase();
      return (v === 'active' || v === 'valid') ? 'Activo' : (v === 'inactive' || v === 'invalid') ? 'Inactivo' : (s || '—');
    };

    grid.innerHTML = clients.map(c => {
      const initial = (c.name || '?')[0].toUpperCase();
      const sub = c.business_name && c.business_name !== c.name
        ? escHtml(c.business_name)
        : (c.phone_number ? escHtml(c.phone_number) : '');
      const sc = statusClass(c.status);

      return `
        <div class="col-sm-6 col-md-6 col-lg-6 col-xl-3">
          <div class="card card-link" onclick="viewClient(${c.id})">
            <div class="card-body">
              <div class="d-flex align-items-center mb-2">
                <span class="avatar-initials me-2" style="background:${avatarColor(c.id)}">${escHtml(initial)}</span>
                <div class="flex-fill" style="min-width:0;">
                  <div class="fw-bold text-truncate" style="font-size:.9rem;">${escHtml(c.name || '—')}</div>
                  ${sub ? `<div class="text-muted text-truncate" style="font-size:.78rem;">${sub}</div>` : ''}
                </div>
              </div>
              <div>
                <span class="status-dot ${sc}"></span>
                <small class="text-muted">${statusLabel(c.status)}</small>
              </div>
            </div>
            <div class="card-footer p-2">
              <div class="row g-2">
                <div class="col-auto">
                  <span class="badge bg-orange-lt">
                    <i class="ti ti-truck me-1"></i>${c.truck_count} unidad${c.truck_count !== 1 ? 'es' : ''}
                  </span>
                </div>
                <div class="col-auto">
                  <span class="badge bg-blue-lt">
                    <i class="ti ti-router me-1"></i>${c.device_count} disp.
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function filterClients(q) {
    // Sync both search inputs
    document.getElementById('search-input').value = q;
    if (document.getElementById('search-input-mobile')) {
      document.getElementById('search-input-mobile').value = q;
    }
    if (!q.trim()) { renderClients(allClients); return; }
    const lower = q.toLowerCase();
    renderClients(allClients.filter(c =>
      (c.name          || '').toLowerCase().includes(lower) ||
      (c.business_name || '').toLowerCase().includes(lower) ||
      (c.phone_number  || '').toLowerCase().includes(lower)
    ));
  }

  function viewClient(id) {
    window.location.href = BASE_PATH + '/trucks.html?client_id=' + id;
  }

  function showError(msg) {
    document.getElementById('clients-grid').innerHTML = `
      <div class="col-12">
        <div class="card">
          <div class="empty">
            <div class="empty-icon text-danger"><i class="ti ti-alert-triangle" style="font-size:3rem;"></i></div>
            <p class="empty-title">Error</p>
            <p class="empty-subtitle text-danger">${escHtml(msg)}</p>
          </div>
        </div>
      </div>`;
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadClients();
</script>
</body>
</html>
