<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.setAttribute('data-bs-theme','dark');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor — FAHR Electronic Systems</title>
  <link rel="stylesheet" href="css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    .map-wrapper { position: relative; }
    #map { height: 560px; width: 100%; border-radius: 4px; }


    #route-bar { display: none; gap: 6px; align-items: center; }

    .star-btn { background: none; border: none; padding: 2px 4px; cursor: pointer; font-size: 1rem; color: var(--tblr-muted); }
    .star-btn.starred { color: #f59f00; }

    .signal-bars { display: inline-flex; align-items: flex-end; gap: 2px; height: 14px; }
    .signal-bar  { width: 3px; border-radius: 1px; background: var(--tblr-gray-300); }
    .signal-bar.filled { background: var(--tblr-success); }
    .signal-bar.filled.weak   { background: var(--tblr-danger); }
    .signal-bar.filled.medium { background: var(--tblr-warning); }
    .signal-bar:nth-child(1) { height: 25%; }
    .signal-bar:nth-child(2) { height: 45%; }
    .signal-bar:nth-child(3) { height: 65%; }
    .signal-bar:nth-child(4) { height: 82%; }
    .signal-bar:nth-child(5) { height: 100%; }

    /* Countdown pill */
    #refresh-pill { font-size: .7rem; opacity: .65; white-space: nowrap; }
  </style>
</head>
<body>
<div class="page">

  <!-- ── Top header ───────────────────────────────────────── -->
  <header class="navbar navbar-expand-md navbar-light d-print-none">
    <div class="container-xl">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <h1 class="navbar-brand navbar-brand-autodark pe-0 pe-md-3 mb-0">
        <a href="/" class="d-flex align-items-center text-decoration-none">
          <img src="img/logo-small.svg" class="hide-theme-dark" alt="FAHR" style="height:30px" onerror="this.style.display='none'">
          <img src="img/logo-small-white.svg" class="hide-theme-light" alt="FAHR" style="height:30px" onerror="this.style.display='none'">
          <span class="ms-2" style="font-size:1rem;font-weight:600">FAHR <span class="d-none d-lg-inline-block">Electronic Systems</span></span>
        </a>
      </h1>
      <div class="navbar-nav flex-row order-md-last ms-auto align-items-center">
        <div class="d-none d-md-flex me-3 align-items-center gap-2 text-muted" style="font-size:.75rem">
          <span id="status-dot" class="status-dot bg-secondary"></span>
          <span id="last-update-text">Actualizando...</span>
        </div>
        <div class="d-none d-md-flex me-2 align-items-center">
          <a href="javascript:void(0)" class="nav-link px-0 hide-theme-dark" onclick="toggleDarkMode()" title="Modo oscuro">
            <i class="icon ti ti-moon"></i>
          </a>
          <a href="javascript:void(0)" class="nav-link px-0 hide-theme-light" onclick="toggleDarkMode()" title="Modo claro">
            <i class="icon ti ti-brightness-up"></i>
          </a>
        </div>
        <div class="nav-item dropdown">
          <a href="javascript:void(0)" class="nav-link d-flex lh-1 text-reset p-0" data-bs-toggle="dropdown">
            <span class="avatar avatar-sm" id="nav-avatar">U</span>
            <div class="d-none d-sm-block ps-2">
              <div id="nav-user-name" class="lh-1" style="font-size:.875rem;font-weight:500"></div>
              <div id="nav-user-role" class="mt-1 small text-muted"></div>
            </div>
          </a>
          <div class="dropdown-menu dropdown-menu-end">
            <a href="javascript:void(0)" class="dropdown-item d-md-none" onclick="toggleDarkMode()">
              <i class="ti ti-moon me-2 hide-theme-dark"></i>
              <i class="ti ti-brightness-up me-2 hide-theme-light"></i>Cambiar tema
            </a>
            <div class="dropdown-divider d-md-none"></div>
            <a href="javascript:void(0)" class="dropdown-item text-danger" onclick="doLogout()">
              <i class="ti ti-logout me-2"></i>Cerrar sesión
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Secondary menu ───────────────────────────────────── -->
  <div class="navbar-expand-md">
    <div class="collapse navbar-collapse" id="navbar-menu">
      <div class="navbar navbar-light">
        <div class="container-xl">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="customers.html">
                <span class="nav-link-icon d-md-none d-lg-inline-block"><i class="ti ti-arrow-left"></i></span>
                <span class="nav-link-title">Clientes</span>
              </a>
            </li>
            <li class="nav-item active">
              <a class="nav-link" href="#">
                <span class="nav-link-icon d-md-none d-lg-inline-block"><i class="ti ti-device-desktop"></i></span>
                <span class="nav-link-title" id="nav-client-name">Monitor</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" id="nav-vehicles-link" href="vehicles.html">
                <span class="nav-link-icon d-md-none d-lg-inline-block"><i class="ti ti-truck"></i></span>
                <span class="nav-link-title">Vehículos</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Page wrapper ─────────────────────────────────────── -->
  <div class="page-wrapper">
    <div class="page-body">
      <div class="container-xl">

        <!-- Page header -->
        <div class="page-header d-print-none mb-3">
          <div class="row align-items-center">
            <div class="col">
              <h2 class="page-title" id="page-client-name">Monitor</h2>
            </div>
            <div class="col-auto ms-auto d-flex gap-2 align-items-center">
              <select id="route-hours" class="form-select form-select-sm" style="width:160px" onchange="reloadRoute()">
                <option value="6">Ruta: últimas 6h</option>
                <option value="24" selected>Ruta: últimas 24h</option>
                <option value="48">Ruta: últimas 48h</option>
                <option value="168">Ruta: última semana</option>
              </select>
              <span id="refresh-pill" class="badge bg-secondary-subtle text-muted"></span>
              <div class="btn-group btn-group-sm" role="group">
                <button type="button" class="btn btn-primary interval-btn" data-secs="10" onclick="setRefreshInterval(10)">10s</button>
                <button type="button" class="btn btn-outline-primary interval-btn" data-secs="30" onclick="setRefreshInterval(30)">30s</button>
                <button type="button" class="btn btn-outline-primary interval-btn" data-secs="60" onclick="setRefreshInterval(60)">1m</button>
              </div>
              <button class="btn btn-sm btn-outline-primary" onclick="manualRefresh()" title="Actualizar">
                <i class="ti ti-refresh"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="row row-deck row-cards g-3">

          <!-- MAP (full width) -->
          <div class="col-12">
            <div class="card">
              <div class="card-header py-2 flex-wrap gap-2">
                <h3 class="card-title"><i class="ti ti-map-2 me-2"></i>Mapa en tiempo real</h3>
                <div class="card-options gap-2 flex-wrap">
                  <div id="route-bar" class="d-flex align-items-center gap-2">
                    <span class="badge bg-blue-lt" id="route-label"></span>
                    <button class="btn btn-sm btn-ghost-secondary" onclick="clearSelection()" title="Limpiar selección">
                      <i class="ti ti-x"></i>
                    </button>
                  </div>
                  <!-- Device selector -->
                  <select id="device-select" class="form-select form-select-sm" style="width:220px" onchange="onDeviceSelect(this.value)">
                    <option value="">— Seleccionar unidad —</option>
                  </select>
                  <span id="device-count" class="badge bg-secondary-subtle text-secondary"></span>
                </div>
              </div>
              <div class="card-body p-0 map-wrapper">
                <div id="map"></div>
              </div>
            </div>
          </div>

          <!-- TELEMETRY PANEL -->
          <div class="col-12" id="telemetry-panel" style="display:none">
            <div class="card">
              <div class="card-header py-2">
                <div>
                  <h3 class="card-title mb-0" id="tel-vehicle-name">—</h3>
                  <small class="text-muted font-monospace" id="tel-imei"></small>
                </div>
                <div class="card-options">
                  <span id="tel-status-badge"></span>
                </div>
              </div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-6 col-sm-4 col-lg-2">
                    <div class="d-flex align-items-center gap-2">
                      <span class="avatar avatar-sm bg-green-lt text-green"><i class="ti ti-power"></i></span>
                      <div>
                        <div class="text-muted" style="font-size:.72rem">Motor</div>
                        <div class="fw-medium" id="tel-ignition">—</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-6 col-sm-4 col-lg-2">
                    <div class="d-flex align-items-center gap-2">
                      <span class="avatar avatar-sm bg-blue-lt text-blue"><i class="ti ti-speedometer"></i></span>
                      <div>
                        <div class="text-muted" style="font-size:.72rem">Velocidad</div>
                        <div class="fw-medium" id="tel-speed">—</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-6 col-sm-4 col-lg-2">
                    <div class="d-flex align-items-center gap-2">
                      <span class="avatar avatar-sm bg-purple-lt text-purple"><i class="ti ti-antenna"></i></span>
                      <div>
                        <div class="text-muted" style="font-size:.72rem">Señal GSM</div>
                        <div class="fw-medium" id="tel-signal">—</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-6 col-sm-4 col-lg-2">
                    <div class="d-flex align-items-center gap-2">
                      <span class="avatar avatar-sm bg-cyan-lt text-cyan"><i class="ti ti-satellite"></i></span>
                      <div>
                        <div class="text-muted" style="font-size:.72rem">Satélites GPS</div>
                        <div class="fw-medium" id="tel-satellites">—</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-6 col-sm-4 col-lg-2">
                    <div class="d-flex align-items-center gap-2">
                      <span class="avatar avatar-sm bg-yellow-lt text-yellow"><i class="ti ti-battery-4"></i></span>
                      <div>
                        <div class="text-muted" style="font-size:.72rem">Batería</div>
                        <div class="fw-medium" id="tel-battery">—</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-6 col-sm-4 col-lg-2">
                    <div class="d-flex align-items-center gap-2">
                      <span class="avatar avatar-sm bg-orange-lt text-orange"><i class="ti ti-plug"></i></span>
                      <div>
                        <div class="text-muted" style="font-size:.72rem">Volt. Ext.</div>
                        <div class="fw-medium" id="tel-ext-voltage">—</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-6 col-sm-4 col-lg-2">
                    <div class="d-flex align-items-center gap-2">
                      <span class="avatar avatar-sm bg-teal-lt text-teal"><i class="ti ti-clock"></i></span>
                      <div>
                        <div class="text-muted" style="font-size:.72rem">Última conexión</div>
                        <div class="fw-medium" id="tel-last-seen" data-ts="">—</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-6 col-sm-4 col-lg-2">
                    <div class="d-flex align-items-center gap-2">
                      <span class="avatar avatar-sm bg-red-lt text-red"><i class="ti ti-map-pin"></i></span>
                      <div>
                        <div class="text-muted" style="font-size:.72rem">Coordenadas</div>
                        <div class="fw-medium" style="font-size:.78rem" id="tel-coords">—</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div><!-- /.row -->
      </div>
    </div>

    <footer class="footer footer-transparent d-print-none">
      <div class="container-xl">
        <div class="row text-center align-items-center">
          <div class="col-12 col-lg-auto mt-3 mt-lg-0">
            <ul class="list-inline list-inline-dots mb-0">
              <li class="list-inline-item">FAHR Electronics Systems &copy; <span id="footer-year"></span></li>
            </ul>
          </div>
        </div>
      </div>
    </footer>
  </div>

</div><!-- /.page -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const BASE_PATH = window.location.pathname.startsWith('/newdashboard') ? '/newdashboard' : '';
  const API       = window.location.origin + BASE_PATH;
  const params    = new URLSearchParams(window.location.search);
  const CLIENT_ID = params.get('client_id');

  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || 'null');
  if (!token || !user) window.location.replace(BASE_PATH + '/login.html');
  if (!CLIENT_ID)      window.location.replace(BASE_PATH + '/customers.html');

  // Dark mode
  (function() {
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.setAttribute('data-bs-theme', 'dark');
      document.body.classList.add('dark');
    }
  })();
  function toggleDarkMode() {
    const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
    document.documentElement.setAttribute('data-bs-theme', isDark ? 'light' : 'dark');
    document.body.classList.toggle('dark', !isDark);
    localStorage.setItem('darkMode', (!isDark).toString());
  }
  function doLogout() {
    localStorage.removeItem('token'); localStorage.removeItem('user');
    window.location.replace(BASE_PATH + '/login.html');
  }

  document.getElementById('footer-year').textContent = new Date().getFullYear();
  document.getElementById('nav-vehicles-link').href  = BASE_PATH + '/vehicles.html' + (CLIENT_ID ? '?client_id=' + CLIENT_ID : '');

  const roleColors = { superuser: '#ae3ec9', admin: '#d63939', owner: '#f76707', driver: '#2fb344' };
  if (user) {
    const color = roleColors[user.role] || '#206bc4';
    document.getElementById('nav-avatar').innerHTML = '<i class="ti ti-user" style="font-size:1rem"></i>';
    document.getElementById('nav-avatar').style.background = '#4dabf720';
    document.getElementById('nav-avatar').style.border = '2px solid #4dabf7';
    document.getElementById('nav-avatar').style.color = '#4dabf7';
    document.getElementById('nav-user-name').textContent   = user.name || user.username;
    document.getElementById('nav-user-role').textContent   = user.role;
  }

  function authHdr() { return { Authorization: `Bearer ${token}` }; }
  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function signalHtml(level) {
    if (level === null || level === undefined) return '<span class="text-muted">— GSM</span>';
    const bars  = ['▁','▂','▃','▄','▅'];
    const lit   = Math.round((level / 5) * bars.length);
    const cls   = level <= 1 ? 'text-danger' : level <= 3 ? 'text-warning' : 'text-success';
    const label = bars.map((b, i) => `<span class="${i < lit ? cls : 'text-muted'}">${b}</span>`).join('');
    return `${label} <span class="${cls}">${level}/5</span>`;
  }

  function batteryHtml(mv) {
    if (mv === null || mv === undefined) return '';
    // FMC650 internal battery: ~3200 mV empty, ~4200 mV full
    const pct = Math.min(100, Math.max(0, Math.round((mv - 3200) / (4200 - 3200) * 100)));
    const cls  = pct <= 20 ? 'text-danger' : pct <= 50 ? 'text-warning' : 'text-success';
    const icon = pct <= 20 ? 'ti-battery-1' : pct <= 50 ? 'ti-battery-2' : pct <= 80 ? 'ti-battery-3' : 'ti-battery-4';
    return `<span class="${cls}"><i class="ti ${icon} me-1"></i>${pct}%</span>`;
  }

  // ── State ─────────────────────────────────────────────────
  let map, routePolyline;
  const markers    = {};
  let allDevices   = [];
  let selectedImei = null;
  let favorites    = new Set(JSON.parse(localStorage.getItem('fahr_favs') || '[]'));
  const ONLINE_MS  = 60 * 1000; // 60 seconds

  function isOnline(last_seen) {
    return last_seen && (Date.now() - new Date(last_seen).getTime()) < ONLINE_MS;
  }
  function formatDate(dt) {
    if (!dt) return '—';
    const d = new Date(dt), diff = Date.now() - d;
    if (diff < 60000)    return 'Hace ' + Math.floor(diff/1000) + 's';
    if (diff < 3600000)  return 'Hace ' + Math.floor(diff/60000) + 'm';
    if (diff < 86400000) return 'Hace ' + Math.floor(diff/3600000) + 'h';
    return d.toLocaleDateString('es-MX', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  // ── Map ───────────────────────────────────────────────────
  const DARK_MAP_STYLE = [
    { elementType: 'geometry', stylers: [{ color: '#212121' }] },
    { elementType: 'labels.text.fill', stylers: [{ color: '#757575' }] },
    { elementType: 'labels.text.stroke', stylers: [{ color: '#212121' }] },
    { featureType: 'administrative.country', elementType: 'labels.text.fill', stylers: [{ color: '#9e9e9e' }] },
    { featureType: 'administrative.locality', elementType: 'labels.text.fill', stylers: [{ color: '#bdbdbd' }] },
    { featureType: 'poi.park', elementType: 'geometry', stylers: [{ color: '#181818' }] },
    { featureType: 'road', elementType: 'geometry.fill', stylers: [{ color: '#2c2c2c' }] },
    { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#373737' }] },
    { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#3c3c3c' }] },
    { featureType: 'road.local', elementType: 'labels.text.fill', stylers: [{ color: '#616161' }] },
    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#000000' }] },
    { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#3d3d3d' }] }
  ];

  let infoWindow = null;

  function initMap() {
    const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 23.6345, lng: -102.5528 },
      zoom: 6,
      styles: isDark ? DARK_MAP_STYLE : [],
      mapTypeControl: true,
      fullscreenControl: true,
      streetViewControl: false
    });
    infoWindow = new google.maps.InfoWindow();

    // Kick off data loading after map is ready
    loadClientName();
    loadData(true);

    // Combined 1s ticker: timestamps + countdown + auto-refresh
    setInterval(async () => {
      tickTimestamps();
      refreshCountdown--;
      const pill = document.getElementById('refresh-pill');
      if (pill) pill.textContent = refreshCountdown > 0 ? `en ${refreshCountdown}s` : '';
      if (refreshCountdown <= 0) {
        refreshCountdown = REFRESH_SECS;
        await loadData(false);
      }
    }, 1000);
  }

  function makeMarkerIcon(online, selected, angle) {
    const color = selected ? '#d63939' : online ? '#2fb344' : '#94a3b8';
    return {
      path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
      scale: selected ? 8 : 6,
      fillColor: color,
      fillOpacity: 1,
      strokeColor: '#ffffff',
      strokeWeight: 1.5,
      rotation: angle || 0
    };
  }

  function buildInfoContent(d) {
    const online = isOnline(d.last_seen);
    const ignOn  = d.ignition == 1;
    return `<div style="min-width:180px;font-family:sans-serif;font-size:13px">
      <div style="font-weight:700;font-size:14px;margin-bottom:2px">${escHtml(d.truck_name || 'Sin unidad')}</div>
      <div style="color:#888;font-family:monospace;font-size:11px;margin-bottom:6px">${escHtml(d.imei)}</div>
      <div style="margin-bottom:3px">${online
        ? '<span style="color:#2fb344">● En línea</span>'
        : '<span style="color:#94a3b8">● Sin conexión</span>'}</div>
      <div style="margin-bottom:3px">${ignOn
        ? '<span style="color:#2fb344">⚡ Motor encendido</span>'
        : '<span style="color:#d63939">⚡ Motor apagado</span>'}</div>
      ${d.last_speed != null ? `<div>Velocidad: <b>${d.last_speed} km/h</b></div>` : ''}
      ${d.last_satellites != null ? `<div>Satélites GPS: <b>${d.last_satellites}</b></div>` : ''}
      <div style="color:#888;font-size:11px;margin-top:6px">${formatDate(d.last_seen)}</div>
    </div>`;
  }

  function updateMarkers() {
    if (!map) return;
    const active = new Set(allDevices.map(d => d.imei));
    Object.keys(markers).forEach(imei => {
      if (!active.has(imei)) { markers[imei].setMap(null); delete markers[imei]; }
    });

    let placed = 0;
    allDevices.forEach(d => {
      if (!d.last_lat || !d.last_lng) return;
      const online   = isOnline(d.last_seen);
      const selected = d.imei === selectedImei;
      const pos = { lat: parseFloat(d.last_lat), lng: parseFloat(d.last_lng) };
      if (markers[d.imei]) {
        markers[d.imei].setPosition(pos);
        markers[d.imei].setIcon(makeMarkerIcon(online, selected, d.angle));
      } else {
        const m = new google.maps.Marker({
          position: pos,
          map,
          icon: makeMarkerIcon(online, selected, d.angle),
          title: d.truck_name || d.imei
        });
        m.addListener('click', () => {
          infoWindow.setContent(buildInfoContent(d));
          infoWindow.open(map, m);
          selectDevice(d.imei);
        });
        markers[d.imei] = m;
      }
      // Update info content in case data changed
      placed++;
    });

    if (!selectedImei && placed > 0) {
      const bounds = new google.maps.LatLngBounds();
      Object.values(markers).forEach(m => bounds.extend(m.getPosition()));
      try { map.fitBounds(bounds); } catch(e) {}
    }
  }

  // ── Display helpers ───────────────────────────────────────
  function signalBarsHtml(level) {
    if (level === null || level === undefined) return '<span class="text-muted small">N/D</span>';
    const n = parseInt(level);
    const colorClass = n <= 1 ? 'weak' : n <= 3 ? 'medium' : '';
    let bars = '';
    for (let i = 1; i <= 5; i++) bars += `<span class="signal-bar${i <= n ? ' filled ' + colorClass : ''}"></span>`;
    return `<div class="signal-bars" title="${n}/5">${bars}</div>`;
  }

  function batteryHtml2(mv) {
    if (mv === null || mv === undefined) return '<span class="text-muted small">N/D</span>';
    const v = (mv / 1000).toFixed(2);
    const pct = Math.min(100, Math.max(0, Math.round((mv - 3000) / (4200 - 3000) * 100)));
    const color = pct < 20 ? 'danger' : pct < 50 ? 'warning' : 'success';
    const icon = pct < 20 ? 'battery-low' : pct < 60 ? 'battery-2' : 'battery-4';
    return `<div class="d-flex align-items-center gap-1"><i class="ti ti-${icon} text-${color}"></i><small>${v}V</small></div>`;
  }

  function extVoltHtml(mv) {
    if (mv === null || mv === undefined) return '<span class="text-muted small">N/D</span>';
    if (mv < 100) return `<span class="text-muted small"><i class="ti ti-plug-off"></i></span>`;
    const v = (mv / 1000).toFixed(1);
    const color = mv >= 11000 ? 'success' : 'warning';
    return `<span class="text-${color}"><i class="ti ti-plug me-1"></i>${v}V</span>`;
  }

  // ── Device selector ───────────────────────────────────────
  function populateSelector(devices) {
    document.getElementById('device-count').textContent = devices.length + ' unidades';
    const sel = document.getElementById('device-select');
    const prev = sel.value;

    // Sort: online first, then offline
    const sorted = [...devices].sort((a, b) => isOnline(b.last_seen) - isOnline(a.last_seen));

    sel.innerHTML = '<option value="">— Seleccionar unidad —</option>' +
      sorted.map(d => {
        const online = isOnline(d.last_seen);
        const label  = d.truck_name ? `${d.truck_name}${d.truck_plate ? ' · ' + d.truck_plate : ''}` : d.imei;
        const status = online ? '🟢' : '⚫';
        return `<option value="${escHtml(d.imei)}" ${d.imei === prev ? 'selected' : ''}>${status} ${escHtml(label)}</option>`;
      }).join('');
  }

  function onDeviceSelect(imei) {
    if (!imei) { clearSelection(); return; }
    selectDevice(imei);
  }

  // ── Telemetry panel ───────────────────────────────────────
  function updateTelemetry(d) {
    if (!d) { document.getElementById('telemetry-panel').style.display = 'none'; return; }
    document.getElementById('telemetry-panel').style.display = '';

    const online = isOnline(d.last_seen);
    const ignOn  = d.ignition == 1;

    document.getElementById('tel-vehicle-name').textContent = d.truck_name || 'Sin unidad';
    document.getElementById('tel-imei').textContent = d.imei;
    document.getElementById('tel-status-badge').innerHTML = online
      ? `<span class="badge bg-success-lt text-success"><span class="status-dot status-dot-animated bg-success me-1"></span>En línea</span>`
      : `<span class="badge bg-danger-lt text-danger"><span class="status-dot bg-danger me-1"></span>Sin conexión</span>`;

    document.getElementById('tel-ignition').innerHTML = ignOn
      ? `<span class="text-success">Encendido</span>`
      : `<span class="text-danger">Apagado</span>`;

    document.getElementById('tel-speed').textContent = d.last_speed != null ? d.last_speed + ' km/h' : '—';

    const sigN = d.signal_level;
    document.getElementById('tel-signal').innerHTML = sigN != null
      ? `${sigN}/5 &nbsp;${signalBarsHtml(sigN)}`
      : '—';

    const sats = d.last_satellites;
    document.getElementById('tel-satellites').innerHTML = sats != null
      ? `<span class="text-${sats === 0 ? 'danger' : sats < 4 ? 'warning' : 'success'}">${sats}</span>`
      : '—';

    document.getElementById('tel-battery').innerHTML = batteryHtml2(d.battery_mv);
    document.getElementById('tel-ext-voltage').innerHTML = extVoltHtml(d.ext_voltage_mv);

    const tsEl = document.getElementById('tel-last-seen');
    tsEl.dataset.ts = d.last_seen || '';
    tsEl.textContent = formatDate(d.last_seen);

    document.getElementById('tel-coords').textContent = d.last_lat && d.last_lng
      ? `${parseFloat(d.last_lat).toFixed(5)}, ${parseFloat(d.last_lng).toFixed(5)}`
      : '—';
  }

  // ── Selection ─────────────────────────────────────────────
  async function selectDevice(imei) {
    selectedImei = imei;

    // Sync the dropdown
    const sel = document.getElementById('device-select');
    if (sel.value !== imei) sel.value = imei;

    // Update marker icons
    allDevices.forEach(d => {
      if (markers[d.imei]) markers[d.imei].setIcon(makeMarkerIcon(isOnline(d.last_seen), d.imei === imei, d.angle));
    });

    // Center on marker + open info window
    const device = allDevices.find(d => d.imei === imei);
    if (markers[imei]) {
      map.panTo(markers[imei].getPosition());
      map.setZoom(15);
      if (device) {
        infoWindow.setContent(buildInfoContent(device));
        infoWindow.open(map, markers[imei]);
      }
    }

    // Show route bar label
    const label = device ? (device.truck_name || device.imei) : imei;
    document.getElementById('route-label').textContent = label;
    document.getElementById('route-bar').style.display = 'flex';

    // Update telemetry panel
    updateTelemetry(device || null);

    // Load route
    await loadRoute(imei);
  }

  async function loadRoute(imei) {
    const hours = document.getElementById('route-hours').value;
    if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }
    try {
      const res  = await fetch(`${API}/api/device/${encodeURIComponent(imei)}/route?hours=${hours}&limit=500`, { headers: authHdr() });
      const data = await res.json();
      if (data.success && data.route.length > 0) {
        const path = data.route.slice().reverse().map(p => ({ lat: parseFloat(p.latitude), lng: parseFloat(p.longitude) }));
        routePolyline = new google.maps.Polyline({
          path,
          geodesic: true,
          strokeColor: '#206bc4',
          strokeOpacity: 0.75,
          strokeWeight: 3,
          map
        });
      }
    } catch(e) {}
  }

  async function reloadRoute() {
    if (selectedImei) await loadRoute(selectedImei);
  }

  function clearSelection() {
    selectedImei = null;
    document.getElementById('device-select').value = '';
    if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }
    infoWindow.close();
    document.getElementById('route-bar').style.display = 'none';
    document.getElementById('telemetry-panel').style.display = 'none';
    allDevices.forEach(d => {
      if (markers[d.imei]) markers[d.imei].setIcon(makeMarkerIcon(isOnline(d.last_seen), false, d.angle));
    });
    const mList = Object.values(markers);
    if (mList.length) {
      const bounds = new google.maps.LatLngBounds();
      mList.forEach(m => bounds.extend(m.getPosition()));
      try { map.fitBounds(bounds); } catch(e) {}
    }
  }

  // ── Silent update (refresh without full re-render) ────────
  function silentUpdate(devices) {
    populateSelector(devices);
    // Refresh telemetry for currently selected device
    if (selectedImei) {
      const d = devices.find(x => x.imei === selectedImei);
      updateTelemetry(d || null);
    }
  }

  // ── 1-second timestamp ticker ──────────────────────────────
  function tickTimestamps() {
    document.querySelectorAll('[data-ts]').forEach(el => {
      el.textContent = formatDate(el.dataset.ts || null);
    });
  }

  // ── Data loading ──────────────────────────────────────────
  async function loadData(initial = false) {
    try {
      const res  = await fetch(`${API}/api/devices/admin`, { headers: authHdr() });
      if (res.status === 401) { doLogout(); return; }
      const data = await res.json();
      if (!data.success) return;

      allDevices = data.devices.filter(d => String(d.client_id) === String(CLIENT_ID));

      if (initial) {
        populateSelector(allDevices);
        // Auto-select first online device with a location
        if (!selectedImei && allDevices.length) {
          const sorted = [...allDevices].sort((a, b) => isOnline(b.last_seen) - isOnline(a.last_seen));
          const first = sorted.find(d => d.last_lat && d.last_lng) || sorted[0];
          if (first) selectDevice(first.imei);
        }
      } else {
        silentUpdate(allDevices);
      }

      updateMarkers();

      // If device was selected, refresh its route
      if (selectedImei) await loadRoute(selectedImei);

      setStatus(true);
    } catch(e) {
      setStatus(false);
      if (initial) {
        document.getElementById('device-count').textContent = 'Error de conexión';
      }
    }
  }

  async function loadClientName() {
    try {
      const res  = await fetch(`${API}/api/clients`, { headers: authHdr() });
      const data = await res.json();
      if (data.success) {
        const c = data.clients.find(c => String(c.id) === String(CLIENT_ID));
        if (c) {
          const name = c.name || c.business_name || 'Cliente';
          document.title = name + ' — Monitor FAHR';
          document.getElementById('nav-client-name').textContent  = name;
          document.getElementById('page-client-name').textContent = name;
        }
      }
    } catch(e) {}
  }

  function setStatus(online) {
    document.getElementById('status-dot').className = 'status-dot ' + (online ? 'bg-success' : 'bg-danger');
    document.getElementById('last-update-text').textContent = online
      ? 'Actualizado ' + new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit', second:'2-digit' })
      : 'Sin conexión';
  }

  function manualRefresh() {
    refreshCountdown = REFRESH_SECS;
    loadData(false);
  }

  // ── Interval selector ────────────────────────────────────
  function setRefreshInterval(secs) {
    REFRESH_SECS = secs;
    refreshCountdown = secs;
    document.querySelectorAll('.interval-btn').forEach(btn => {
      const selected = parseInt(btn.dataset.secs) === secs;
      btn.classList.toggle('btn-primary', selected);
      btn.classList.toggle('btn-outline-primary', !selected);
    });
  }

  // ── Init ──────────────────────────────────────────────────
  let REFRESH_SECS = 10;
  let refreshCountdown = REFRESH_SECS;
  // initMap() is called by Google Maps API as callback after script loads
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDBRtzvm22YwD_ukdtpI7P4FuCWYPv-xNE&callback=initMap">
</script>
</body>
