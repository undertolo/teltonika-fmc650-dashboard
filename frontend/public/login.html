<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Teltonika FMC650</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">📡</div>
      <h1 class="login-title">Teltonika FMC650</h1>
      <p class="login-subtitle">Fleet Management Dashboard</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div id="login-error" class="login-error" style="display:none"></div>
        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    (function () {
      const token = localStorage.getItem('token');
      const base = window.location.pathname.startsWith('/newdashboard') ? '/newdashboard' : '';
      if (token) window.location.replace(base + '/');
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';

      try {
        const base = window.location.pathname.startsWith('/newdashboard') ? '/newdashboard' : '';
        const res = await fetch(base + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          const base = window.location.pathname.startsWith('/newdashboard') ? '/newdashboard' : '';
          window.location.replace(base + '/');
        } else {
          throw new Error(data.error || 'Login failed');
        }
      } catch (err) {
        errorEl.textContent = err.message === 'Failed to fetch' ? 'Server unavailable' : 'Invalid username or password';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
