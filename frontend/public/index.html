<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teltonika FMC650 Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>📡 Teltonika FMC650 Dashboard</h1>
        <div class="header-info">
            <span id="server-status" class="status-badge">●</span>
            <span id="last-update">Actualizando...</span>
            <span id="user-info" class="user-info"></span>
            <button id="users-btn" class="users-btn" onclick="app.openUserPanel()" title="Manage Users" style="display:none">👥 Users</button>
            <button class="dark-mode-btn" onclick="app.toggleDarkMode()" title="Toggle dark mode">🌙</button>
            <button class="logout-btn" onclick="app.logout()" title="Logout">⏻</button>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            <!-- Sidebar con lista de dispositivos -->
            <aside class="sidebar">
                <div class="card">
                    <h2>Dispositivos</h2>
                    <button class="refresh-btn" onclick="app.loadDevices()">
                        🔄 Actualizar
                    </button>
                    <div id="device-list" class="device-list">
                        <div class="loading">Cargando dispositivos...</div>
                    </div>
                </div>
            </aside>

            <!-- Mapa principal -->
            <main class="main-content">
                <div class="card">
                    <div class="map-header">
                        <h2>Mapa en Tiempo Real</h2>
                        <button class="show-all-btn" onclick="app.showAllDevices()">Show All Devices</button>
                    </div>
                    <div id="map"></div>
                </div>
            </main>
        </div>

        <!-- Información del dispositivo seleccionado -->
        <div id="device-info" class="info-panel" style="display: none;">
            <h2>Información del Dispositivo</h2>
            <div id="device-details" class="info-grid"></div>
        </div>

        <!-- Estadísticas -->
        <div class="stats-grid" id="stats-grid" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="stat-speed">--</div>
                <div class="stat-label">Velocidad (km/h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-altitude">--</div>
                <div class="stat-label">Altitud (m)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-satellites">--</div>
                <div class="stat-label">Satélites</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-records">--</div>
                <div class="stat-label">Registros Totales</div>
            </div>
        </div>
    </div>

    <!-- User Management Modal -->
    <div id="users-modal" class="modal-overlay" style="display:none" onclick="app.closeUserPanel(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>User Management</h2>
                <button class="modal-close" onclick="app.closeUserPanel()">✕</button>
            </div>
            <div class="modal-body">
                <div id="users-table-container"></div>
                <div id="user-form-container" style="display:none">
                    <h3 id="user-form-title">Add User</h3>
                    <form id="user-form" onsubmit="app.submitUserForm(event)">
                        <input type="hidden" id="edit-user-id">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="form-username" required>
                            </div>
                            <div class="form-group">
                                <label>Name</label>
                                <input type="text" id="form-name">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Role</label>
                                <select id="form-role" required>
                                    <option value="driver">Driver</option>
                                    <option value="owner">Owner</option>
                                    <option value="admin">Admin</option>
                                    <option value="superuser">Superuser</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label id="form-password-label">Password</label>
                                <input type="password" id="form-password" placeholder="Leave blank to keep current">
                            </div>
                        </div>
                        <div id="user-form-error" class="form-error" style="display:none"></div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary" id="user-form-submit">Save</button>
                            <button type="button" class="btn-secondary" onclick="app.hideUserForm()">Cancel</button>
                        </div>
                    </form>
                </div>
                <button class="btn-primary" onclick="app.showAddUserForm()" id="add-user-btn">+ Add User</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
